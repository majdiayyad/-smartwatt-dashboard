<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartWatt — Energy Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0E1216;
    --panel: #171C22;
    --panel-border: #262E37;
    --amber: #F5A623;
    --cyan: #3FD8DA;
    --red: #E5484D;
    --text: #E8ECEF;
    --text-dim: #7C8894;
    --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    padding: 24px;
    min-height: 100vh;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--panel-border);
  }

  h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 0;
  }

  h1 span { color: var(--amber); }

  .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 4px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 16px 18px;
  }

  .card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .card-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .card-value.anomaly { color: var(--red); }

  .card-unit {
    font-size: 14px;
    color: var(--text-dim);
    margin-left: 4px;
  }

  .card-sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    font-family: var(--mono);
  }

  .card-cost {
    font-size: 12px;
    color: var(--amber);
    margin-top: 3px;
    font-family: var(--mono);
  }

  .led {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cyan);
  }
  .led.hot { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .panels {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 16px;
  }

  @media (max-width: 800px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 18px;
  }

  .panel h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 0 0 14px 0;
    font-weight: 600;
  }

  .alert-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--panel-border);
    font-size: 13px;
  }
  .alert-row:last-child { border-bottom: none; }

  .alert-device {
    font-family: var(--mono);
    color: var(--red);
    font-weight: 600;
  }

  .alert-meta {
    color: var(--text-dim);
    font-size: 11px;
    font-family: var(--mono);
  }

  .empty-state {
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px 0;
    text-align: center;
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 0;
  }

  .settings-row label {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text);
  }

  .settings-row input {
    background: var(--bg);
    border: 1px solid var(--panel-border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    padding: 6px 8px;
    width: 90px;
    text-align: right;
  }

  .settings-row button {
    background: var(--amber);
    border: none;
    border-radius: 6px;
    color: #14181C;
    font-weight: 600;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
  }
  .settings-row button:hover { opacity: 0.9; }

  .chart-wrap {
    height: 260px;
    margin-top: 16px;
  }

  .save-msg {
    font-size: 11px;
    color: var(--cyan);
    margin-left: 8px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-msg.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Smart<span>Watt</span></h1>
    <div class="subtitle">Live energy monitoring &amp; anomaly alerts</div>
  </div>
  <div class="status-pill"><span class="dot"></span> LIVE</div>
</header>

<div id="deviceGrid" class="grid"></div>

<div class="panels">
  <div class="panel">
    <h2>Power draw — last readings</h2>
    <div class="chart-wrap"><canvas id="powerChart"></canvas></div>

    <h2 style="margin-top:22px;">Cost by zone</h2>
    <div id="zoneList"></div>
  </div>

  <div class="panel">
    <h2>Recent alerts</h2>
    <div id="alertsList"><div class="empty-state">No alerts yet.</div></div>

    <h2 style="margin-top:22px;">Alert thresholds</h2>
    <div id="thresholdList"></div>

    <h2 style="margin-top:22px;">Electricity rate</h2>
    <div class="settings-row" style="border-bottom:1px solid var(--panel-border); padding-bottom:14px; margin-bottom:6px;">
      <label style="color:var(--amber);">Rate (€/kWh)</label>
      <input type="number" step="0.01" value="0.25" id="global-rate" style="width:70px;" title="Applies to every device">
      <button onclick="saveGlobalRate()">Apply to all</button>
      <span class="save-msg" id="globalratemsg">saved</span>
    </div>
    <div id="rateList"></div>

    <h2 style="margin-top:22px;">Zones</h2>
    <div id="zoneEditList"></div>
  </div>
</div>

<script>
const API_BASE = "https://func-smartwatt-dev.azurewebsites.net/api";

const COLORS = ["#F5A623", "#3FD8DA", "#E5484D", "#8B7FD9", "#5AC85A"];
let chart;

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error("Request failed: " + url);
  return res.json();
}

function timeAgo(isoString) {
  const diff = (Date.now() - new Date(isoString).getTime()) / 1000;
  if (diff < 60) return Math.floor(diff) + "s ago";
  if (diff < 3600) return Math.floor(diff / 60) + "m ago";
  return Math.floor(diff / 3600) + "h ago";
}

async function loadDeviceCards(readings, deviceMeta) {
  const grid = document.getElementById("deviceGrid");
  grid.innerHTML = "";

  const byDevice = {};
  readings.forEach(r => {
    if (!byDevice[r.deviceId] || new Date(r.timestamp) > new Date(byDevice[r.deviceId].timestamp)) {
      byDevice[r.deviceId] = r;
    }
  });

  const metaByDevice = {};
  deviceMeta.forEach(d => { metaByDevice[d.deviceId] = d; });

  Object.keys(byDevice).sort().forEach(deviceId => {
    const r = byDevice[deviceId];
    const meta = metaByDevice[deviceId] || {};
    const zone = meta.zone || "Unassigned";
    const costPerHour = meta.costPerHourEur ?? 0;

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-label">
        <span>${deviceId}</span>
        <span class="led ${r.isAnomaly ? 'hot' : ''}"></span>
      </div>
      <div class="card-value ${r.isAnomaly ? 'anomaly' : ''}">${r.watts.toFixed(1)}<span class="card-unit">W</span></div>
      <div class="card-sub">${timeAgo(r.timestamp)} · ${zone}</div>
      <div class="card-cost">€${costPerHour.toFixed(3)}/h</div>
    `;
    grid.appendChild(card);
  });
}

function formatTime(isoString) {
  const d = new Date(isoString);
  return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0") + ":" + d.getSeconds().toString().padStart(2, "0");
}

function loadChart(readings) {
  const byDevice = {};
  const sorted = readings.slice(0, 60).reverse();
  const labels = [...new Set(sorted.map(r => formatTime(r.timestamp)))];

  sorted.forEach(r => {
    if (!byDevice[r.deviceId]) byDevice[r.deviceId] = {};
    byDevice[r.deviceId][formatTime(r.timestamp)] = r.watts;
  });

  const datasets = Object.keys(byDevice).sort().map((deviceId, i) => ({
    label: deviceId,
    data: labels.map(l => byDevice[deviceId][l] ?? null),
    borderColor: COLORS[i % COLORS.length],
    backgroundColor: "transparent",
    borderWidth: 1.5,
    pointRadius: 0,
    tension: 0.25,
    spanGaps: true,
  }));

  const ctx = document.getElementById("powerChart");
  if (chart) {
    chart.destroy();
    chart = null;
  }
  chart = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "nearest", intersect: false },
      scales: {
        x: { ticks: { color: "#7C8894", maxTicksLimit: 6 }, grid: { color: "#262E37" } },
        y: { ticks: { color: "#7C8894" }, grid: { color: "#262E37" } },
      },
      plugins: {
        legend: { labels: { color: "#E8ECEF", boxWidth: 10, font: { size: 11 } } },
      },
    },
  });
}

function loadZoneSummary(devices) {
  const container = document.getElementById("zoneList");
  const byZone = {};
  devices.forEach(d => {
    const zone = d.zone || "Unassigned";
    byZone[zone] = (byZone[zone] || 0) + (d.costPerHourEur || 0);
  });

  const zones = Object.keys(byZone).sort();
  if (!zones.length) {
    container.innerHTML = '<div class="empty-state">No devices yet.</div>';
    return;
  }
  container.innerHTML = zones.map(zone => `
    <div class="alert-row">
      <div class="alert-device" style="color:var(--cyan);">${zone}</div>
      <div class="alert-meta">€${byZone[zone].toFixed(3)}/h</div>
    </div>
  `).join("");
}

function loadZoneEditor(devices) {
  const container = document.getElementById("zoneEditList");
  container.innerHTML = "";

  devices.sort((a, b) => a.deviceId.localeCompare(b.deviceId)).forEach(d => {
    const row = document.createElement("div");
    row.className = "settings-row";
    row.innerHTML = `
      <label>${d.deviceId}</label>
      <input type="text" placeholder="zone" value="${d.zone && d.zone !== 'Unassigned' ? d.zone : ''}" id="zone-${d.deviceId}" style="width:110px; text-align:left;">
      <button onclick="saveZone('${d.deviceId}')">Set</button>
      <span class="save-msg" id="zonemsg-${d.deviceId}">saved</span>
    `;
    container.appendChild(row);
  });
}

async function saveZone(deviceId) {
  const input = document.getElementById(`zone-${deviceId}`);
  const zone = input.value.trim();
  if (!zone) return;

  await fetch(`${API_BASE}/devicemeta`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ deviceId, zone }),
  });

  const msg = document.getElementById(`zonemsg-${deviceId}`);
  msg.classList.add("show");
  setTimeout(() => msg.classList.remove("show"), 1500);
}

function loadAlerts(alerts) {
  const container = document.getElementById("alertsList");
  if (!alerts.length) {
    container.innerHTML = '<div class="empty-state">No alerts yet.</div>';
    return;
  }
  container.innerHTML = alerts.slice(0, 8).map(a => `
    <div class="alert-row">
      <div>
        <div class="alert-device">${a.deviceId}</div>
        <div class="alert-meta">${a.watts.toFixed(1)}W · threshold ${a.threshold.toFixed(1)}W</div>
      </div>
      <div class="alert-meta">${timeAgo(a.timestamp)}</div>
    </div>
  `).join("");
}

async function loadThresholds(devices) {
  const container = document.getElementById("thresholdList");
  container.innerHTML = "";

  const deviceIds = [...new Set(devices.map(d => d.deviceId))].sort();

  for (const deviceId of deviceIds) {
    let currentThreshold = null;
    try {
      const s = await fetchJSON(`${API_BASE}/settings?deviceId=${deviceId}`);
      currentThreshold = s.thresholdWatts;
    } catch (e) { /* no setting yet */ }

    const row = document.createElement("div");
    row.className = "settings-row";
    row.innerHTML = `
      <label>${deviceId}</label>
      <input type="number" step="1" placeholder="auto (3x avg)" value="${currentThreshold ?? ''}" id="threshold-${deviceId}" title="Threshold (W)">
      <button onclick="saveThreshold('${deviceId}')">Set</button>
      <span class="save-msg" id="thresholdmsg-${deviceId}">saved</span>
    `;
    container.appendChild(row);
  }
}

async function saveThreshold(deviceId) {
  const thresholdInput = document.getElementById(`threshold-${deviceId}`);
  const thresholdWatts = parseFloat(thresholdInput.value);
  if (isNaN(thresholdWatts)) return;

  await fetch(`${API_BASE}/settings`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ deviceId, thresholdWatts }),
  });

  const msg = document.getElementById(`thresholdmsg-${deviceId}`);
  msg.classList.add("show");
  setTimeout(() => msg.classList.remove("show"), 1500);
}

async function loadRates(devices) {
  const container = document.getElementById("rateList");
  container.innerHTML = "";

  const deviceIds = [...new Set(devices.map(d => d.deviceId))].sort();

  for (const deviceId of deviceIds) {
    let currentRate = 0.25;
    try {
      const s = await fetchJSON(`${API_BASE}/settings?deviceId=${deviceId}`);
      currentRate = s.rateEurPerKwh ?? 0.25;
    } catch (e) { /* no setting yet */ }

    const row = document.createElement("div");
    row.className = "settings-row";
    row.innerHTML = `
      <label>${deviceId}</label>
      <input type="number" step="0.01" value="${currentRate}" id="rate-${deviceId}" style="width:70px;" title="€/kWh">
      <button onclick="saveRate('${deviceId}')">Set</button>
      <span class="save-msg" id="ratemsg-${deviceId}">saved</span>
    `;
    container.appendChild(row);
  }
}

async function saveRate(deviceId) {
  const rateInput = document.getElementById(`rate-${deviceId}`);
  const rateEurPerKwh = parseFloat(rateInput.value);
  if (isNaN(rateEurPerKwh)) return;

  await fetch(`${API_BASE}/settings`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ deviceId, rateEurPerKwh }),
  });

  const msg = document.getElementById(`ratemsg-${deviceId}`);
  msg.classList.add("show");
  setTimeout(() => msg.classList.remove("show"), 1500);
}

async function saveGlobalRate() {
  const rateInput = document.getElementById("global-rate");
  const rateEurPerKwh = parseFloat(rateInput.value);
  if (isNaN(rateEurPerKwh)) return;

  const deviceIds = [...document.querySelectorAll('[id^="threshold-"]')].map(el => el.id.replace("threshold-", ""));

  await Promise.all(deviceIds.map(deviceId =>
    fetch(`${API_BASE}/settings`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deviceId, rateEurPerKwh }),
    })
  ));

  const msg = document.getElementById("globalratemsg");
  msg.classList.add("show");
  setTimeout(() => msg.classList.remove("show"), 1500);
}

async function refresh() {
  try {
    const [readings, alerts, devices] = await Promise.all([
      fetchJSON(`${API_BASE}/readings`),
      fetchJSON(`${API_BASE}/alerts`),
      fetchJSON(`${API_BASE}/devices`),
    ]);

    const deviceList = devices.length ? devices : readings.map(r => ({ deviceId: r.deviceId, zone: "Unassigned", costPerHourEur: 0 }));

    await loadDeviceCards(readings, deviceList);
    loadChart(readings);
    loadAlerts(alerts);
    loadZoneSummary(deviceList);
    loadZoneEditor(deviceList);
    await loadThresholds(deviceList);
    await loadRates(deviceList);
  } catch (e) {
    console.error("Refresh failed:", e);
  }
}

refresh();
setInterval(refresh, 15000);
</script>

</body>
</html>
